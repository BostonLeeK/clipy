name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') {
            $version = $Matches[1]
          } else {
            $version = (Get-Content version.txt -Raw).Trim()
          }
          "value=$version" >> $env:GITHUB_OUTPUT
          Set-Content -Path version.txt -Value $version -NoNewline

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish Clipy/Clipy.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Build portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = "${{ steps.version.outputs.value }}"
          $staging = "$env:RUNNER_TEMP\clipy-portable"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item -Path publish/* -Destination $staging -Recurse -Force
          Compress-Archive -Path "$staging/*" -DestinationPath "dist/Clipy-$version-win-x64-portable.zip" -CompressionLevel Optimal

      - name: Generate installer icon
        shell: pwsh
        run: ./generate-icons.ps1

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after Inno Setup install"
          }
          $version = "${{ steps.version.outputs.value }}"
          $publish = (Resolve-Path publish).Path
          $dist = (Resolve-Path dist).Path
          $installer = (Resolve-Path installer).Path
          & $iscc installer/Clipy.iss `
            "/DAppVersion=$version" `
            "/DPublishDir=$publish" `
            "/DOutputDir=$dist" `
            "/DSourcePath=$installer" `
            "/DIconFile=clipy.ico" `
            /Qp
          $setup = Get-ChildItem dist -Filter "Clipy-Setup-$version-x64.exe" | Select-Object -First 1
          if (-not $setup) { throw "Installer not found in dist/" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clipy-${{ steps.version.outputs.value }}-win-x64
          path: |
            dist/Clipy-Setup-${{ steps.version.outputs.value }}-x64.exe
            dist/Clipy-${{ steps.version.outputs.value }}-win-x64-portable.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Clipy-Setup-${{ steps.version.outputs.value }}-x64.exe
            dist/Clipy-${{ steps.version.outputs.value }}-win-x64-portable.zip
          generate_release_notes: true
